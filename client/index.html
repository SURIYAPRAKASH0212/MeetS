<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetS - Video Calling</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <h1 class="logo">MeetS</h1>
        <div class="header-right">
            <span id="room-display"></span>
        </div>
    </header>

    <!-- Landing Screen -->
    <div id="landing-container" class="landing-container">
        <div class="landing-card">
            <h2>Welcome to MeetS</h2>
            <p>Premium quality 1-on-1 video calling</p>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Your Name" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="text" id="room-input" placeholder="Room ID (e.g., meet-123)" autocomplete="off">
            </div>
            <button id="join-btn" class="primary-btn">Join / Create Room</button>
            <p id="error-msg" class="error-msg"></p>
        </div>
    </div>

    <!-- Call Screen -->
    <div id="call-container" class="call-container hidden">
        <div class="main-content">
            <div class="video-grid">
                <div class="video-wrapper">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="video-label" id="local-name">You</div>
                </div>
                <div class="video-wrapper">
                    <video id="remote-video" autoplay playsinline></video>
                    <div class="video-label" id="remote-name">Waiting for someone to join...</div>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="controls-bar">
                <button id="mic-btn" class="control-btn active" title="Mute/Unmute Mic">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button id="camera-btn" class="control-btn active" title="Turn Camera On/Off">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                </button>
                <button id="end-btn" class="control-btn end-call" title="End Call">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path></svg>
                </button>
                <button id="chat-toggle-btn" class="control-btn" title="Toggle Chat">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Chat Sidebar -->
        <div id="chat-panel" class="chat-sidebar">
            <div class="chat-header">
                <h3>Meeting Chat</h3>
                <button id="close-chat-btn" class="icon-btn">&times;</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="system-message">Welcome to the chat!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn" class="icon-btn send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Socket.IO and Main Script -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
